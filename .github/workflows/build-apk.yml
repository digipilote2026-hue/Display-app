name: Build APK Debug

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Verify APK size
        run: |
          APK=app/build/outputs/apk/debug/cashplus-display-universal-debug.apk
          SIZE=$(wc -c < "$APK")
          echo "APK size: $SIZE bytes"
          [ "$SIZE" -gt 100000 ] || (echo "APK trop petit" && exit 1)

      # Supprime la release "latest" existante puis en crée une nouvelle propre
      - name: Delete existing latest release
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "DG Pilot Display — Dernière version"
          files: app/build/outputs/apk/debug/cashplus-display-universal-debug.apk
          fail_on_unmatched_files: true
