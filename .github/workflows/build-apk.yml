name: Build APK Debug

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install SDK platform + build-tools 33
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" \
            "build-tools;33.0.2"

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Verify APK exists and size
        run: |
          APK=app/build/outputs/apk/debug/cashplus-display-universal-debug.apk
          if [ ! -f "$APK" ]; then
            echo "APK NOT FOUND"
            exit 1
          fi
          SIZE=$(wc -c < "$APK")
          echo "APK size: $SIZE bytes"
          if [ "$SIZE" -lt 500000 ]; then
            echo "APK trop petit — probablement corrompu"
            exit 1
          fi
          echo "APK OK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cashplus-display-universal-debug
          path: app/build/outputs/apk/debug/cashplus-display-universal-debug.apk
          retention-days: 30
